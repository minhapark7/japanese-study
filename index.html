<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にほんご 일본어 공부 🌸</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    :root {
      --pink:    #ffb7c5;
      --pink-l:  #fff0f4;
      --purple:  #c9b8ff;
      --purple-l:#f3f0ff;
      --mint:    #b2ecd8;
      --mint-l:  #edfaf4;
      --yellow:  #ffe8a3;
      --yellow-l:#fffbee;
      --bg:      #fdf7ff;
      --text:    #3d3352;
      --sub:     #8b7ea8;
      --white:   #ffffff;
      --radius:  18px;
      --shadow:  0 4px 20px rgba(120,80,180,.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #ffb7c5 0%, #c9b8ff 100%);
      padding: 28px 20px 20px;
      text-align: center;
      box-shadow: 0 3px 12px rgba(180,120,200,.2);
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,.15);
      letter-spacing: .05em;
    }
    header p { font-size: .9rem; color: rgba(255,255,255,.85); margin-top: 4px; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px 16px 0;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--white);
      color: var(--sub);
      box-shadow: 0 2px 8px rgba(120,80,180,.1);
      transition: all .2s;
    }
    .tab-btn:hover { transform: translateY(-2px); }
    .tab-btn.active {
      background: linear-gradient(135deg, #ffb7c5, #c9b8ff);
      color: #fff;
      box-shadow: 0 4px 14px rgba(180,120,200,.35);
    }

    /* ── PANELS ── */
    .panel { display: none; padding: 24px 16px 40px; max-width: 960px; margin: 0 auto; }
    .panel.active { display: block; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--sub);
      letter-spacing: .08em;
      margin: 28px 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, #ddd4f7, transparent);
      border-radius: 2px;
    }

    /* ──────────────────────────────
       HIRAGANA
    ────────────────────────────── */
    .hira-row-label {
      font-size: .75rem;
      font-weight: 700;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin: 6px 0 8px;
    }

    .hira-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .hira-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 8px 12px;
      text-align: center;
      box-shadow: var(--shadow);
      cursor: default;
      user-select: none;
    }
    .hira-card .char {
      font-size: 2rem;
      line-height: 1.2;
      font-weight: 700;
    }
    .hira-card .roma {
      font-size: .72rem;
      color: var(--sub);
      margin-top: 4px;
      font-weight: 600;
    }
    .hira-card.empty {
      background: transparent;
      box-shadow: none;
      cursor: default;
      pointer-events: none;
    }

    /* color rows — hiragana */
    .row-a  .hira-card:not(.empty) { border-top: 3px solid #ffb7c5; }
    .row-ka .hira-card:not(.empty) { border-top: 3px solid #ffc98b; }
    .row-sa .hira-card:not(.empty) { border-top: 3px solid #ffe8a3; }
    .row-ta .hira-card:not(.empty) { border-top: 3px solid #b2ecd8; }
    .row-na .hira-card:not(.empty) { border-top: 3px solid #a8d8ff; }
    .row-ha .hira-card:not(.empty) { border-top: 3px solid #c9b8ff; }
    .row-ma .hira-card:not(.empty) { border-top: 3px solid #ffb7e8; }
    .row-ya .hira-card:not(.empty) { border-top: 3px solid #b2f0b2; }
    .row-ra .hira-card:not(.empty) { border-top: 3px solid #ffd6a5; }
    .row-wa .hira-card:not(.empty) { border-top: 3px solid #d4b8ff; }
    .row-n  .hira-card:not(.empty) { border-top: 3px solid #b8d4ff; }

    /* color rows — katakana */
    .kata-a  .hira-card:not(.empty) { border-top: 3px solid #ffb7c5; }
    .kata-ka .hira-card:not(.empty) { border-top: 3px solid #ffc98b; }
    .kata-sa .hira-card:not(.empty) { border-top: 3px solid #ffe8a3; }
    .kata-ta .hira-card:not(.empty) { border-top: 3px solid #b2ecd8; }
    .kata-na .hira-card:not(.empty) { border-top: 3px solid #a8d8ff; }
    .kata-ha .hira-card:not(.empty) { border-top: 3px solid #c9b8ff; }
    .kata-ma .hira-card:not(.empty) { border-top: 3px solid #ffb7e8; }
    .kata-ya .hira-card:not(.empty) { border-top: 3px solid #b2f0b2; }
    .kata-ra .hira-card:not(.empty) { border-top: 3px solid #ffd6a5; }
    .kata-wa .hira-card:not(.empty) { border-top: 3px solid #d4b8ff; }
    .kata-n  .hira-card:not(.empty) { border-top: 3px solid #b8d4ff; }

    /* ──────────────────────────────
       VOCABULARY
    ────────────────────────────── */
    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .vocab-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .18s, box-shadow .18s;
      position: relative;
      user-select: none;
    }
    .vocab-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(180,120,200,.22);
    }
    .vocab-card.playing {
      box-shadow: 0 0 0 3px var(--pink);
    }
    .vocab-card .jp  { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    .vocab-card .roma { font-size: .75rem; color: var(--sub); font-weight: 600; }
    .vocab-card .kr  { font-size: .82rem; color: var(--text); margin-top: 6px; font-weight: 600; }
    .vocab-card .speaker {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 1rem;
    }

    /* category accent colors */
    .cat-greet  .vocab-card { border-left: 4px solid var(--pink); }
    .cat-num    .vocab-card { border-left: 4px solid var(--purple); }
    .cat-color  .vocab-card { border-left: 4px solid var(--mint); }
    .cat-food   .vocab-card { border-left: 4px solid var(--yellow); }
    .cat-body   .vocab-card { border-left: 4px solid #ffc9b8; }
    .cat-nature .vocab-card { border-left: 4px solid #b8e0ff; }

    /* ──────────────────────────────
       QUIZ
    ────────────────────────────── */
    .quiz-box {
      background: var(--white);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: var(--shadow);
      max-width: 440px;
      margin: 0 auto;
    }
    .quiz-question {
      font-size: 4rem;
      font-weight: 800;
      margin: 12px 0 8px;
    }
    .quiz-hint { font-size: .9rem; color: var(--sub); margin-bottom: 24px; }
    .quiz-choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .choice-btn {
      padding: 14px 10px;
      border: 2px solid #e8dfff;
      border-radius: 14px;
      background: var(--white);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      color: var(--text);
    }
    .choice-btn:hover { background: var(--purple-l); border-color: var(--purple); }
    .choice-btn.correct { background: var(--mint-l); border-color: var(--mint); color: #1a7a4a; }
    .choice-btn.wrong   { background: #fff0f0; border-color: #ffb3b3; color: #c0392b; }

    .quiz-score {
      font-size: .9rem;
      color: var(--sub);
      font-weight: 700;
    }
    .quiz-feedback {
      font-size: 1.5rem;
      min-height: 2rem;
      margin-bottom: 8px;
    }
    .next-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, #ffb7c5, #c9b8ff);
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(180,120,200,.35);
      transition: transform .18s;
    }
    .next-btn:hover { transform: translateY(-2px) scale(1.03); }

    .quiz-listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: var(--yellow-l);
      border: 2px solid var(--yellow);
      border-radius: 50px;
      font-family: inherit;
      font-size: .88rem;
      font-weight: 700;
      color: #7a6000;
      cursor: pointer;
      margin-bottom: 16px;
      transition: transform .15s, background .15s;
    }
    .quiz-listen-btn:hover { background: var(--yellow); transform: scale(1.05); }

    /* ── QUIZ MODE SELECTOR ── */
    .quiz-modes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .mode-btn {
      padding: 8px 18px;
      border: 2px solid #e8dfff;
      border-radius: 50px;
      background: var(--white);
      font-family: inherit;
      font-size: .82rem;
      font-weight: 700;
      color: var(--sub);
      cursor: pointer;
      transition: all .18s;
    }
    .mode-btn:hover { border-color: var(--purple); color: var(--text); }
    .mode-btn.active {
      background: linear-gradient(135deg, #ffb7c5, #c9b8ff);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 10px rgba(180,120,200,.3);
    }
    .quiz-sentence-q {
      font-size: 1.3rem !important;
      line-height: 1.5;
      word-break: keep-all;
    }

    /* ── PROGRESS ── */
    .quiz-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .quiz-prog-text {
      font-size: .82rem;
      font-weight: 700;
      color: var(--sub);
      white-space: nowrap;
    }
    .quiz-prog-bar {
      flex: 1;
      height: 8px;
      background: #ede8ff;
      border-radius: 10px;
      overflow: hidden;
    }
    .quiz-prog-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffb7c5, #c9b8ff);
      border-radius: 10px;
      transition: width .3s ease;
    }

    /* ── RESULT ── */
    .result-emoji { font-size: 3rem; margin-bottom: 6px; }
    .result-title { font-size: 1.2rem; font-weight: 800; color: var(--sub); }
    .result-score { font-size: 3.5rem; font-weight: 800; margin: 10px 0 2px; line-height: 1; }
    .result-pct   { font-size: 1rem; color: var(--sub); font-weight: 700; margin-bottom: 20px; }
    .wrong-title  { font-size: .9rem; font-weight: 800; color: #c0392b; margin: 16px 0 10px; text-align:left; }
    .wrong-list   { display: flex; flex-direction: column; gap: 8px; text-align: left; }
    .wrong-item {
      background: #fff5f5;
      border: 1px solid #ffcdd2;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: .9rem;
    }
    .wrong-q     { font-size: 1.3rem; font-weight: 800; }
    .wrong-arrow { color: var(--sub); }
    .wrong-a     { font-weight: 700; color: #1a7a4a; }
    .wrong-yours { font-size: .78rem; color: #c0392b; margin-left: auto; }

    /* ── HISTORY ── */
    .history-list { display: flex; flex-direction: column; gap: 8px; max-width: 560px; margin: 0 auto; }
    .history-item {
      background: var(--white);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: .88rem;
    }
    .h-date  { color: var(--sub); font-weight: 600; flex: 1; }
    .h-mode  { background: var(--purple-l); color: #6040b0; font-weight: 700; padding: 2px 10px; border-radius: 20px; font-size: .78rem; }
    .h-score { font-weight: 800; color: var(--text); }
    .h-stars { color: #f5a623; letter-spacing: 1px; font-size: .85rem; }
    .history-clear-btn {
      background: none;
      border: 1px solid #e0d8f0;
      border-radius: 50px;
      padding: 4px 14px;
      font-family: inherit;
      font-size: .78rem;
      color: var(--sub);
      cursor: pointer;
      margin-left: auto;
    }
    .history-clear-btn:hover { background: #fff0f4; color: #c0392b; border-color: #ffb3b3; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #3d3352;
      color: #fff;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: .9rem;
      font-weight: 700;
      opacity: 0;
      transition: all .3s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ──────────────────────────────
       TRAVEL PHRASES
    ────────────────────────────── */
    .travel-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .18s, box-shadow .18s;
      user-select: none;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .travel-card:hover  { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(180,120,200,.2); }
    .travel-card.playing { box-shadow: 0 0 0 3px var(--pink); background: var(--pink-l); }
    .travel-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
    .travel-body { flex: 1; }
    .travel-jp   { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .travel-kr   { font-size: .85rem; color: var(--sub); font-weight: 600; }
    .travel-sound { font-size: .95rem; flex-shrink: 0; opacity: .5; }

    /* ──────────────────────────────
       CALENDAR / RECORD
    ────────────────────────────── */
    .cal-wrap { max-width: 480px; margin: 0 auto; }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-title { font-size: 1.15rem; font-weight: 800; }
    .cal-nav-btn {
      background: var(--white);
      border: 2px solid #e8dfff;
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
    }
    .cal-nav-btn:hover { background: var(--purple-l); }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .cal-dow {
      text-align: center;
      font-size: .72rem;
      font-weight: 800;
      color: var(--sub);
      padding-bottom: 4px;
    }
    .cal-dow:first-child { color: #e05555; }
    .cal-dow:last-child  { color: #5588e0; }
    .cal-cell {
      aspect-ratio: 1;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }
    .cal-cell.empty    { cursor: default; }
    .cal-cell:not(.empty):hover { background: var(--purple-l); }
    .cal-cell.today    { background: var(--pink-l); border: 2px solid var(--pink); }
    .cal-cell.selected { background: var(--purple-l); border: 2px solid var(--purple); }
    .cal-cell .stamp   { font-size: 1.1rem; line-height: 1; }
    .cal-cell .day-num { font-size: .72rem; color: var(--sub); }
    .cal-cell.has-record .day-num { color: var(--text); }

    .day-detail {
      background: var(--white);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-top: 16px;
      box-shadow: var(--shadow);
      min-height: 60px;
    }
    .day-detail-date { font-size: .85rem; font-weight: 800; color: var(--sub); margin-bottom: 12px; }
    .day-activity {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f0ecff;
      font-size: .9rem;
      font-weight: 600;
    }
    .day-activity:last-child { border-bottom: none; }
    .activity-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .hira-grid { gap: 7px; }
      .hira-card .char { font-size: 1.5rem; }
      .quiz-question { font-size: 3rem; }
      .cal-cell { border-radius: 8px; font-size: .75rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🌸 にほんご 일본어</h1>
  <p>히라가나 · 카타카나 · 기초단어 · 퀴즈</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('hira', event)">🔤 히라가나</button>
  <button class="tab-btn" onclick="switchTab('kata', event)">🔡 카타카나</button>
  <button class="tab-btn" onclick="switchTab('vocab', event)">📖 기초단어</button>
  <button class="tab-btn" onclick="switchTab('travel', event)">✈️ 여행회화</button>
  <button class="tab-btn" onclick="switchTab('quiz', event)">🎮 퀴즈</button>
  <button class="tab-btn" onclick="switchTab('record', event)">📅 학습기록</button>
</div>

<!-- ═══════════════ HIRAGANA ═══════════════ -->
<div id="panel-hira" class="panel active"></div>

<!-- ═══════════════ KATAKANA ═══════════════ -->
<div id="panel-kata" class="panel"></div>

<!-- ═══════════════ VOCABULARY ═══════════════ -->
<div id="panel-vocab" class="panel"></div>

<!-- ═══════════════ TRAVEL ═══════════════ -->
<div id="panel-travel" class="panel"></div>

<!-- ═══════════════ RECORD ═══════════════ -->
<div id="panel-record" class="panel">
  <div class="cal-wrap" id="cal-wrap"></div>
</div>

<!-- ═══════════════ QUIZ ═══════════════ -->
<div id="panel-quiz" class="panel">
  <div class="quiz-modes">
    <button class="mode-btn active" onclick="setMode('all',this)">🌸 종합퀴즈</button>
    <button class="mode-btn" onclick="setMode('hira',this)">🔤 히라가나</button>
    <button class="mode-btn" onclick="setMode('kata',this)">🔡 카타카나</button>
    <button class="mode-btn" onclick="setMode('vocab',this)">📖 단어</button>
    <button class="mode-btn" onclick="setMode('sentence',this)">💬 문장</button>
  </div>

  <!-- 문제 화면 -->
  <div class="quiz-box" id="quiz-playing">
    <div class="quiz-progress">
      <span class="quiz-prog-text" id="quiz-prog-text">1 / 20</span>
      <div class="quiz-prog-bar"><div class="quiz-prog-fill" id="quiz-prog-fill" style="width:0%"></div></div>
    </div>
    <div class="quiz-question" id="quiz-q">?</div>
    <button class="quiz-listen-btn" onclick="quizListen()">🔊 발음 듣기</button>
    <div class="quiz-hint" id="quiz-hint">다음 중 맞는 읽기를 고르세요</div>
    <div class="quiz-feedback" id="quiz-fb"></div>
    <div class="quiz-choices" id="quiz-choices"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="advanceQuiz()">다음 문제 ▶</button>
  </div>

  <!-- 결과 화면 -->
  <div class="quiz-box quiz-result" id="quiz-result" style="display:none">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title">퀴즈 완료!</div>
    <div class="result-score" id="result-score"></div>
    <div class="result-pct"   id="result-pct"></div>
    <div id="wrong-section"></div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:24px">
      <button class="next-btn" onclick="startSession()">🔄 다시 풀기</button>
    </div>
  </div>

  <!-- 기록 -->
  <div id="history-section"></div>
</div>

<div class="toast" id="toast"></div>

<script>

// ── TTS (Web Speech API) ─────────────────────────

let currentPlayingCard = null;
let playingTimer = null;

// 여성 일본어 목소리 우선순위 (브라우저별 음성 이름)
const JA_FEMALE_PRIORITY = [
  'Google 日本語',          // Chrome (Google 음성 — 가장 자연스러움)
  'O-Ren',                  // macOS
  'Kyoko',                  // macOS 구버전
  'Microsoft Haruka',       // Windows
  'Microsoft Ayumi',        // Windows
  'Microsoft Nanami',       // Windows
];

let _jaVoice = null;

function _resolveVoice() {
  if (_jaVoice) return _jaVoice;
  const voices = speechSynthesis.getVoices();
  // 1) 우선순위 목록에서 매칭
  for (const name of JA_FEMALE_PRIORITY) {
    const v = voices.find(v => v.name === name);
    if (v) { _jaVoice = v; return v; }
  }
  // 2) ja-JP 중 이름에 female/woman/haruka/kyoko/nanami 포함
  const femaleHint = /female|woman|haruka|kyoko|nanami|ayumi|o-ren/i;
  const v2 = voices.find(v => v.lang.startsWith('ja') && femaleHint.test(v.name));
  if (v2) { _jaVoice = v2; return v2; }
  // 3) ja-JP 아무 목소리
  const v3 = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
  if (v3) { _jaVoice = v3; return v3; }
  return null;
}

function clearPlaying() {
  if (currentPlayingCard) {
    currentPlayingCard.classList.remove('playing');
    currentPlayingCard = null;
  }
  if (playingTimer) { clearTimeout(playingTimer); playingTimer = null; }
}

function speak(text, cardEl) {
  if (!window.speechSynthesis) {
    showToast('이 브라우저는 음성을 지원하지 않아요 😢');
    return;
  }

  speechSynthesis.cancel();
  clearPlaying();

  function _doSpeak() {
    const voice = _resolveVoice();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang  = 'ja-JP';
    utter.rate  = 0.82;   // 살짝 느리게 — 학습용
    utter.pitch = 1.15;   // 여성 목소리 강조
    utter.volume = 1.0;
    if (voice) utter.voice = voice;

    if (cardEl) {
      cardEl.classList.add('playing');
      currentPlayingCard = cardEl;
      playingTimer = setTimeout(clearPlaying, 6000);
    }
    utter.onend   = clearPlaying;
    utter.onerror = clearPlaying;
    speechSynthesis.speak(utter);
  }

  // 음성 목록이 아직 안 로드된 경우(첫 방문) 대기
  if (speechSynthesis.getVoices().length > 0) {
    setTimeout(_doSpeak, 50); // Chrome cancel() 직후 무시 버그 방지
  } else {
    speechSynthesis.onvoiceschanged = () => {
      speechSynthesis.onvoiceschanged = null;
      _jaVoice = null; // 다시 탐색
      setTimeout(_doSpeak, 50);
    };
  }
}

function _buildCharGrid(panel, rows, title) {
  let html = '<div style="max-width:560px;margin:0 auto">';
  html += `<div class="section-title">${title}</div>`;
  rows.forEach(row => {
    html += `<div class="hira-row-label">${row.label}</div>`;
    html += `<div class="hira-grid ${row.id}">`;
    row.chars.forEach(ch => {
      if (!ch) {
        html += '<div class="hira-card empty"></div>';
      } else {
        html += `<div class="hira-card">
          <div class="char">${ch[0]}</div>
          <div class="roma">${ch[1]}</div>
        </div>`;
      }
    });
    html += '</div>';
  });
  html += '</div>';
  panel.innerHTML = html;
}

function buildHira() { _buildCharGrid(document.getElementById('panel-hira'), HIRA_ROWS, '히라가나 오십음도'); }
function buildKata() { _buildCharGrid(document.getElementById('panel-kata'), KATA_ROWS, '카타카나 오십음도'); }

function speakCard(el) { speak(el.dataset.text, el); }

  const panel = document.getElementById('panel-vocab');

  VOCAB_CATS.forEach(cat => {
    html += `<div class="section-title">${cat.label}</div>`;
    html += `<div class="vocab-grid ${cat.id}">`;
    cat.words.forEach(w => {
      html += `<div class="vocab-card" data-text="${w.jp}" onclick="speakCard(this)">

        <div class="jp">${w.jp}</div>
        <div class="roma">${w.roma}</div>
        <div class="kr">${w.kr}</div>
      </div>`;
    });
    html += '</div>';
  });

  panel.innerHTML = html;
}

    html += `<div class="section-title">${cat.label}</div>
    <div style="display:flex;flex-direction:column;gap:10px;max-width:640px;margin:0 auto 8px">`;
    cat.phrases.forEach(p => {
      const safe = p.jp.replace(/'/g, '&#39;');
      html += `<div class="travel-card" data-text="${safe}" onclick="travelSpeak(this,'${cat.id}')">
        <div class="travel-body">
          <div class="travel-jp">${p.jp}</div>
          <div class="travel-kr">${p.kr}</div>
        </div>
        <span class="travel-sound">🔊</span>
      </div>`;
    });
    html += '</div>';
  });
  panel.innerHTML = html;
}

function shuffled(arr) { return [...arr].sort(() => Math.random() - .5); }

function getPool() {
  return quizMode === 'all' ? QUIZ_POOL : QUIZ_POOL.filter(x => x.type === quizMode);
}

function hintText(type) {
  return (type === 'vocab' || type === 'sentence') ? '다음 중 맞는 뜻을 고르세요' : '다음 중 맞는 로마자 읽기를 고르세요';
}

// ── SESSION ───────────────────────────────────────

function startSession() {
  const pool = getPool();
  sessionQuestions = shuffled(pool).slice(0, QUIZ_SIZE);
  sessionIndex = 0;
  sessionCorrect = 0;
  sessionWrong = [];

  document.getElementById('quiz-playing').style.display = '';
  document.getElementById('quiz-result').style.display = 'none';
  showQuestion();
}

function setMode(mode, btn) {
  quizMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  startSession();
}

function showQuestion() {
  quizLocked = false;
  document.getElementById('quiz-fb').textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  currentQuiz = sessionQuestions[sessionIndex];
  const total = sessionQuestions.length;

  document.getElementById('quiz-prog-text').textContent = `${sessionIndex + 1} / ${total}`;
  document.getElementById('quiz-prog-fill').style.width = `${(sessionIndex / total) * 100}%`;

  const qEl = document.getElementById('quiz-q');
  qEl.textContent = currentQuiz.q;
  qEl.className = 'quiz-question' + (currentQuiz.type === 'sentence' ? ' quiz-sentence-q' : '');
  document.getElementById('quiz-hint').textContent = hintText(currentQuiz.type);

  const sameType = QUIZ_POOL.filter(x => x.type === currentQuiz.type && x.a !== currentQuiz.a);
  const wrong = shuffled(sameType).slice(0, 3).map(x => x.a);
  const choices = shuffled([currentQuiz.a, ...wrong]);

  const box = document.getElementById('quiz-choices');
  box.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => checkAnswer(btn, c);
    box.appendChild(btn);
  });
}

function checkAnswer(btn, choice) {
  if (quizLocked) return;
  quizLocked = true;

  const correct = choice === currentQuiz.a;
  const total = sessionQuestions.length;

  if (correct) {
    sessionCorrect++;
    btn.classList.add('correct');
    document.getElementById('quiz-fb').textContent = '✨ 정답!';
    speak(currentQuiz.q);
  } else {
    btn.classList.add('wrong');
    document.getElementById('quiz-fb').textContent = `😢 정답: ${currentQuiz.a}`;
    sessionWrong.push({ q: currentQuiz.q, a: currentQuiz.a, chosen: choice });
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === currentQuiz.a) b.classList.add('correct');
    });
  }

  document.getElementById('quiz-prog-fill').style.width = `${((sessionIndex + 1) / total) * 100}%`;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = '';
  nextBtn.textContent = sessionIndex < total - 1 ? '다음 문제 ▶' : '결과 보기 🏆';
}

function advanceQuiz() {
  sessionIndex++;
  if (sessionIndex >= sessionQuestions.length) showResult();
  else showQuestion();
}

// ── RESULT ────────────────────────────────────────

function showResult() {
  document.getElementById('quiz-playing').style.display = 'none';
  document.getElementById('quiz-result').style.display = '';

  const total = sessionQuestions.length;
  const pct = Math.round((sessionCorrect / total) * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '😊' : '😢';

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').textContent = `${sessionCorrect} / ${total}`;
  document.getElementById('result-pct').textContent = `정답률 ${pct}%`;

  const ws = document.getElementById('wrong-section');
  if (sessionWrong.length === 0) {
    ws.innerHTML = '<p style="color:#1a7a4a;font-weight:700;margin-top:16px">🎊 전부 맞혔어요!</p>';
  } else {
    let html = `<div class="wrong-title">틀린 문제 (${sessionWrong.length}개)</div><div class="wrong-list">`;
    sessionWrong.forEach(w => {
      html += `<div class="wrong-item">
        <span class="wrong-q">${w.q}</span>
        <span class="wrong-arrow">→</span>
        <span class="wrong-a">${w.a}</span>
        <span class="wrong-yours">내 답: ${w.chosen}</span>
      </div>`;
    });
    html += '</div>';
    ws.innerHTML = html;
  }

  logActivity('quiz');
  saveHistory(sessionCorrect, total, pct);
  renderHistory();
}

// ── HISTORY ───────────────────────────────────────

const HISTORY_KEY = 'jp-quiz-history';
const MODE_LABEL = {all:'종합', hira:'히라가나', kata:'카타카나', vocab:'단어', sentence:'문장'};

function saveHistory(correct, total, pct) {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const now = new Date();
  history.unshift({
    date: now.toLocaleDateString('ko-KR'),
    time: now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}),
    correct, total, pct,
    mode: quizMode,
  });
  if (history.length > 30) history.pop();
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function clearHistory() {
  if (!confirm('퀴즈 기록을 모두 삭제할까요?')) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const sec = document.getElementById('history-section');
  if (!history.length) { sec.innerHTML = ''; return; }

  let html = `<div class="section-title" style="margin-top:36px;max-width:560px;margin-left:auto;margin-right:auto">
    📋 퀴즈 기록
    <button class="history-clear-btn" onclick="clearHistory()">전체 삭제</button>
  </div>
  <div class="history-list">`;

  history.forEach(h => {
    const stars = Math.round(h.pct / 20);
    const starStr = '★'.repeat(stars) + '☆'.repeat(5 - stars);
    const modeLabel = MODE_LABEL[h.mode] || h.mode;
    html += `<div class="history-item">
      <span class="h-date">${h.date} ${h.time}</span>
      <span class="h-mode">${modeLabel}</span>
      <span class="h-score">${h.correct}/${h.total}</span>
      <span class="h-stars">${starStr}</span>
    </div>`;
  });
  html += '</div>';
  sec.innerHTML = html;
}

// ── STUDY RECORD ─────────────────────────────────

const RECORD_KEY = 'jp-study-records';

function todayKey() {
  return new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
}

function logActivity(type, detail) {
  const records = JSON.parse(localStorage.getItem(RECORD_KEY) || '{}');
  const key = todayKey();
  if (!records[key]) records[key] = {};
  const day = records[key];

  if (type === 'quiz') {
    day.quiz = (day.quiz || 0) + 1;
  } else if (type === 'travel') {
    if (!day.travel) day.travel = [];
    if (!day.travel.includes(detail)) day.travel.push(detail);
  } else {
    day[type] = true;
  }
  localStorage.setItem(RECORD_KEY, JSON.stringify(records));
}

// ── CALENDAR ─────────────────────────────────────

let calYear, calMonth, calSelected = null;

function buildCalendar(year, month) {
  calYear = year; calMonth = month;
  const records = JSON.parse(localStorage.getItem(RECORD_KEY) || '{}');
  const today = todayKey();

  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthStr = `${year}년 ${month + 1}월`;
  const dows = ['일','월','화','수','목','금','토'];

  let html = `<div class="cal-header">
    <button class="cal-nav-btn" onclick="buildCalendar(${month===0?year-1:year},${month===0?11:month-1})">‹</button>
    <span class="cal-title">${monthStr}</span>
    <button class="cal-nav-btn" onclick="buildCalendar(${month===11?year+1:year},${month===11?0:month+1})">›</button>
  </div>
  <div class="cal-grid">`;

  dows.forEach(d => { html += `<div class="cal-dow">${d}</div>`; });

  // 빈칸
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasRecord = !!records[dateKey];
    const isToday = dateKey === today;
    const isSelected = dateKey === calSelected;
    let cls = 'cal-cell';
    if (hasRecord) cls += ' has-record';
    if (isToday)   cls += ' today';
    if (isSelected) cls += ' selected';
    html += `<div class="${cls}" onclick="selectDay('${dateKey}')">
      ${hasRecord ? '<span class="stamp">🌸</span>' : ''}
      <span class="day-num">${d}</span>
    </div>`;
  }
  html += '</div>';

  if (calSelected) html += renderDayDetail(calSelected, records);

  document.getElementById('cal-wrap').innerHTML = html;
}

function selectDay(dateKey) {
  calSelected = calSelected === dateKey ? null : dateKey;
  buildCalendar(calYear, calMonth);
}

function renderDayDetail(dateKey, records) {
  const day = records[dateKey];
  if (!day) return `<div class="day-detail"><div class="day-detail-date">${dateKey}</div><div style="color:var(--sub);font-size:.88rem">학습 기록 없음</div></div>`;

  const ACTIVITY_MAP = [
    { key:'hira',  label:'히라가나 학습',  color:'#ffb7c5' },
    { key:'kata',  label:'카타카나 학습',  color:'#c9b8ff' },
    { key:'vocab', label:'기초단어 학습',  color:'#b2ecd8' },
    { key:'quiz',  label:'퀴즈',           color:'#ffe8a3' },
    { key:'travel',label:'여행회화',       color:'#ffc9b8' },
  ];

  const TRAVEL_LABEL = {airport:'공항',hotel:'호텔',restaurant:'식당',convenience:'편의점',transport:'교통',shopping:'쇼핑'};

  let inner = '';
  ACTIVITY_MAP.forEach(a => {
    if (!day[a.key]) return;
    let detail = '';
    if (a.key === 'quiz') detail = ` — ${day.quiz}회 완료`;
    if (a.key === 'travel' && Array.isArray(day.travel))
      detail = ' — ' + day.travel.map(t => TRAVEL_LABEL[t] || t).join(', ');
    inner += `<div class="day-activity">
      <span class="activity-dot" style="background:${a.color}"></span>
      ${a.label}${detail}
    </div>`;
  });

  return `<div class="day-detail">
    <div class="day-detail-date">${dateKey} 학습 내용</div>
    ${inner || '<div style="color:var(--sub);font-size:.88rem">기록 없음</div>'}
  </div>`;
}

// ── TABS ─────────────────────────────────────────

function switchTab(name, e) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  e.currentTarget.classList.add('active');

  if (name === 'kata'   && !document.getElementById('panel-kata').innerHTML) buildKata();
  if (name === 'travel' && !document.getElementById('panel-travel').innerHTML) buildTravel();
  if (name === 'record') { const n=new Date(); buildCalendar(n.getFullYear(), n.getMonth()); }
  if (name === 'quiz') {
    if (!currentQuiz) startSession();
    renderHistory();
  }
  if (['hira','kata','vocab'].includes(name)) logActivity(name);
}

// ── TOAST ─────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function quizListen() {
  if (currentQuiz) speak(currentQuiz.q);
}

// ── INIT ─────────────────────────────────────────
buildHira();
buildVocab();
logActivity('hira'); // 첫 방문 기록
</script>
